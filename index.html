<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouro - بوابة الفرص الذهبية</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #D4AF37;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        .balance-card {
            border: 1px solid #D4AF37;
            border-radius: 20px;
            padding: 30px;
            width: 80%;
            max-width: 350px;
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .balance-label {
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }

        .balance-amount {
            font-size: 2.8rem;
            font-weight: bold;
        }

        #connect-wallet {
            margin-top: 50px;
            background-color: #D4AF37;
            color: #121212;
            border: none;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        #connect-wallet:active {
            transform: scale(0.95);
        }

        #user-info {
            margin-top: 20px;
            font-size: 1rem;
            display: none; /* مخفي حتى يتم الاتصال */
        }
    </style>
</head>
<body>

    <div class="logo">OURO</div>
    <div class="subtitle">بوابة الفرص الذهبية في شبكة باي</div>

    <div class="balance-card">
        <span class="balance-label">رصيدك الحالي | Your Balance</span>
        <div class="balance-amount" id="pi-balance">π 0.00</div>
    </div>

    <button id="connect-wallet">اتصال بمحفظة باي</button>
    
    <div id="user-info">مرحباً، <span id="username"></span></div>

    <script>
        // تهيئة مكتبة باي
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        const connectBtn = document.getElementById('connect-wallet');
        const balanceDisplay = document.getElementById('pi-balance');
        const userInfo = document.getElementById('user-info');
        const usernameSpan = document.getElementById('username');

        connectBtn.onclick = function() {
            // البدء في عملية المصادقة
            Pi.authenticate(['payments', 'username'], onIncompletePaymentFound)
              .then(function(auth) {
                console.log("تم الاتصال!");
                
                // تحديث الواجهة بعد نجاح الاتصال
                connectBtn.innerText = "تم الاتصال بنجاح";
                connectBtn.style.backgroundColor = "#4CAF50"; // تغيير اللون للأخضر
                connectBtn.style.color = "white";
                
                usernameSpan.innerText = auth.user.username;
                userInfo.style.display = "block";
                balanceDisplay.innerText = "جاري المزامنة..";
                
                alert("أهلاً بك يا " + auth.user.username + " في Ouro");
              })
              .catch(function(error) {
                console.error(error);
                alert("يرجى فتح التطبيق من داخل متصفح باي (Pi Browser) لتتمكن من الاتصال.");
              });
        };

        function onIncompletePaymentFound(payment) {
            // التعامل مع المدفوعات المعلقة (خطوة متقدمة لاحقاً)
        };
    </script>

</body>
</html>
